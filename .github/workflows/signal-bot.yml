name: Stock Signal Bot

on:
  workflow_dispatch:
  schedule:
    # UTC. 23:00-23:45 is 08:00-08:45 JST on the next day.
    - cron: "*/15 23 * * 0-4"
    # UTC. 00:00-06:45 is 09:00-15:45 JST.
    - cron: "*/15 0-6 * * 1-5"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run analysis and update report
        run: python app/runner.py --watchlist config/watchlist.csv --notify --export-report docs/index.html

      - name: Commit generated report and notification state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/notification_state.json
          git diff --cached --quiet || git commit -m "Update stock signal report"
          git push
