<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本株AIシグナルbot MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">日本株AIシグナルbot MVP</p>
        <h1>監視銘柄とシグナル</h1>
      </div>
      <div class="actions">
        <button id="analyzeBtn">全銘柄を分析</button>
        <button id="notifyAnalyzeBtn" class="secondary">分析して通知判定</button>
      </div>
    </header>

    <main>
      <section class="notice">
        <strong>免責:</strong>
        本システムは投資助言ではありません。表示内容は売買を推奨・保証するものではなく、最終判断は利用者本人が行ってください。
      </section>

      <section class="summary" id="summary"></section>

      <section class="grid two">
        <form id="stockForm" class="panel">
          <h2>銘柄登録</h2>
          <input type="hidden" id="stockId" />
          <label>銘柄コード<input id="code" required placeholder="7203" /></label>
          <label>銘柄名<input id="name" required placeholder="トヨタ自動車" /></label>
          <label>タグ<input id="tags" placeholder="低位株,AI関連" /></label>
          <label>メモ<textarea id="memo" rows="3"></textarea></label>
          <div class="form-row">
            <label>監視状態
              <select id="watch_status">
                <option value="normal">通常監視</option>
                <option value="strong">強監視</option>
                <option value="stopped">停止</option>
              </select>
            </label>
            <label>想定購入金額<input id="target_amount" type="number" value="100000" /></label>
          </div>
          <div class="form-row">
            <label><input id="is_holding" type="checkbox" /> 保有中</label>
            <label><input id="allow_additional_buy" type="checkbox" /> 買い増し候補を出す</label>
          </div>
          <div class="form-row">
            <label>保有単価<input id="holding_price" type="number" step="0.01" /></label>
            <label>保有株数<input id="holding_shares" type="number" /></label>
          </div>
          <div class="actions">
            <button type="submit">保存</button>
            <button type="button" id="resetForm" class="secondary">入力クリア</button>
          </div>
        </form>

        <section class="panel">
          <h2>CSV一括登録</h2>
          <p class="muted">ヘッダー例: code,name,tags,memo,watch_status</p>
          <textarea id="csvContent" rows="10">code,name,tags,memo,watch_status
5253,カバー,グロース,サンプル,normal</textarea>
          <button id="importCsvBtn">CSVを取り込む</button>
        </section>
      </section>

      <section class="panel wide">
        <div class="section-head">
          <h2>監視銘柄一覧</h2>
          <p class="muted">スコア順に表示します。</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>コード</th>
                <th>銘柄名</th>
                <th>現在値</th>
                <th>前日比</th>
                <th>出来高倍率</th>
                <th>シグナル</th>
                <th>スコア</th>
                <th>リスク</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="stocksBody"></tbody>
          </table>
        </div>
      </section>

      <section class="grid two">
        <section class="panel">
          <h2>最新シグナル</h2>
          <div id="signals"></div>
        </section>
        <section class="panel">
          <h2>通知履歴</h2>
          <div id="notifications"></div>
        </section>
      </section>

      <section class="panel wide" id="detailPanel" hidden>
        <div class="section-head">
          <h2 id="detailTitle">銘柄詳細</h2>
          <button id="closeDetail" class="secondary">閉じる</button>
        </div>
        <canvas id="chart" width="1100" height="320"></canvas>
        <div id="detailContent"></div>
      </section>
    </main>

    <div id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
